spring:
  application:
    name: konditor

  jackson:
    deserialization:
      fail-on-unknown-properties: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/konditor}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# ─── Security ────────────────────────────────────────────────────────────────
security:
  google:
    client-id: ${GOOGLE_CLIENT_ID:1045651153478-4379bpb4fepqg0gvlg4goktic09vl883.apps.googleusercontent.com}

  jwt:
    secret: ${JWT_SECRET:secret-key-change-me-please-!-if-you-use-jwt-in-production}
    # Access token: 15 minutes
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
    # Refresh token: 30 days
    refresh-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:2592000}

  cookie:
    # false only in local development (HTTP). Always true in production.
    secure: ${COOKIE_SECURE:true}

  cors:
    # Comma-separated list of allowed origins. Never use * in production.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5500,http://localhost:5500}

  token-cleanup:
    # Cron to purge expired refresh tokens. Default: daily at 03:00 UTC.
    cron: ${TOKEN_CLEANUP_CRON:0 0 3 * * *}

# ─── Actuator / Health Check ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        # Expõe apenas health — nunca exponha env, beans, mappings em produção
        include: health
  endpoint:
    health:
      # Unauthenticated → {"status":"UP"}  |  Authenticated → detalhes completos
      show-details: when-authorized
      show-components: when-authorized
  health:
    # Habilita probes /actuator/health/liveness e /actuator/health/readiness (Kubernetes)
    probes:
      enabled: ${HEALTH_PROBES_ENABLED:true}
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    db:
      enabled: true
    diskspace:
      enabled: true


