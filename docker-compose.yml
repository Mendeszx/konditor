# Sobe o Konditor completo (API + PostgreSQL) em qualquer máquina com Docker.
#
#   cp .env.example .env      # ajuste os valores se quiser
#   docker compose up --build
#
# A API fica em http://localhost:8080 e o Postgres em localhost:5432.
# O schema (schema_completo.sql) é aplicado automaticamente na 1ª subida do banco.

services:
  db:
    image: postgres:16-alpine
    container_name: konditor-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: konditor
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Aplicado apenas na primeira inicialização (quando o volume está vazio)
      - ./src/main/resources/database/schema_completo.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d konditor"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
    container_name: konditor-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Conecta no serviço "db" pela rede interna do compose
      DB_URL: jdbc:postgresql://db:5432/konditor
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DDL_AUTO: ${DDL_AUTO:-validate}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-1045651153478-4379bpb4fepqg0gvlg4goktic09vl883.apps.googleusercontent.com}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-min-32-chars!}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      JWT_REFRESH_EXPIRATION_SECONDS: ${JWT_REFRESH_EXPIRATION_SECONDS:-2592000}
      # false em dev local (HTTP). Em produção, sempre true (HTTPS).
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5500,http://127.0.0.1:5500}
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  pgdata:
